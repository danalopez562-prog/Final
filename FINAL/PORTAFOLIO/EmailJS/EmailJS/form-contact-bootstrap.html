<section id="form-contact" class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">

                        <h2 class="mb-4 text-center">Contáctanos</h2>

                        <form id="contact-form">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="from_name" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="from_name" name="from_name" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="reply_to" class="form-label">Correo Electrónico</label>
                                    <input type="email" class="form-control" id="reply_to" name="reply_to" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="message" class="form-label">Mensaje</label>
                                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    Enviar Mensaje
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
